<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Voronoi · Wallpaper 04</title>
<style>
  html,body{margin:0;background:#020817;overflow:hidden;height:100%;font-family:system-ui,-apple-system,sans-serif;cursor:crosshair;}
  canvas{display:block;width:100vw;height:100vh;}
  .label{
    position:fixed;left:24px;bottom:22px;
    color:rgba(255,255,255,.45);font-size:10.5px;
    letter-spacing:.32em;text-transform:uppercase;font-weight:500;
    pointer-events:none;
  }
  .nav{
    position:fixed;right:24px;bottom:22px;
    display:flex;gap:14px;
    color:rgba(255,255,255,.4);font-size:10.5px;
    letter-spacing:.24em;text-transform:uppercase;font-weight:500;
  }
  .nav a{color:inherit;text-decoration:none;transition:color .2s;}
  .nav a:hover{color:#fff;}
  .nav a.active{color:#fff;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="label">04 · Voronoi · Click to pulse</div>
<div class="nav">
  <a href="index.html">◀ All</a>
  <a href="01-liquid.html">01</a>
  <a href="02-aurora.html">02</a>
  <a href="03-constellation.html">03</a>
  <a href="04-voronoi.html" class="active">04</a>
  <a href="05-depth-grid.html">05</a>
</div>
<script>
const c = document.getElementById('c');
const gl = c.getContext('webgl', { antialias: true });

function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  c.width = window.innerWidth * dpr;
  c.height = window.innerHeight * dpr;
  c.style.width = window.innerWidth + 'px';
  c.style.height = window.innerHeight + 'px';
  gl.viewport(0, 0, c.width, c.height);
}
resize();
window.addEventListener('resize', resize);

const vs = `attribute vec2 p;void main(){gl_Position=vec4(p,0.,1.);}`;

const fs = `
precision highp float;
uniform vec2 res;
uniform float time;
uniform vec2 mouse;
uniform vec2 pulsePos;
uniform float pulseAge;
uniform float pulseAlive;

vec2 hash(vec2 p) {
  p = vec2(dot(p, vec2(127.1, 311.7)), dot(p, vec2(269.5, 183.3)));
  return fract(sin(p) * 43758.5453);
}

// Voronoi returning (cell distance, edge distance)
vec3 voronoi(vec2 uv, float t) {
  vec2 g = floor(uv);
  vec2 f = fract(uv);
  float md1 = 8., md2 = 8.;
  vec2 mPoint = vec2(0.);
  for (int x = -1; x <= 1; x++) {
    for (int y = -1; y <= 1; y++) {
      vec2 o = vec2(float(x), float(y));
      vec2 r = hash(g + o);
      r = 0.5 + 0.5 * sin(t + 6.2831 * r);
      vec2 p = o + r - f;
      float d = dot(p, p);
      if (d < md1) {
        md2 = md1;
        md1 = d;
        mPoint = g + o + r;
      } else if (d < md2) {
        md2 = d;
      }
    }
  }
  return vec3(sqrt(md1), sqrt(md2) - sqrt(md1), mPoint.x + mPoint.y);
}

void main() {
  vec2 uv = (gl_FragCoord.xy - .5*res) / min(res.x, res.y);
  vec2 m  = (mouse - .5*res) / min(res.x, res.y);

  // Mouse warp – gentle pull of the field toward the cursor
  vec2 toMouse = uv - m;
  float dm = length(toMouse);
  uv += normalize(toMouse + vec2(.0001)) * exp(-dm * 2.5) * 0.18;

  // Click pulse: distort the scale outward
  if (pulseAlive > 0.001) {
    vec2 rp = (pulsePos - .5*res) / min(res.x, res.y);
    float dr = length(uv - rp);
    float wave = sin(dr * 14. - pulseAge * 6.) * exp(-dr * 1.8) * exp(-pulseAge * 0.7) * pulseAlive;
    uv += normalize(uv - rp + vec2(.0001)) * wave * 0.10;
  }

  vec3 v = voronoi(uv * 4.0, time * 0.18);

  float cell = v.x;          // distance to nearest center
  float edge = v.y;          // distance to second-nearest minus first
  float seed = v.z;          // unique-ish per cell

  // Soft cell tint
  float tint = sin(seed * 1.7) * .5 + .5;

  // Highlight cell edges with a thin glow line
  float line = 1.0 - smoothstep(0.0, 0.06, edge);

  // Base palette
  vec3 deep   = vec3(0.010, 0.025, 0.080);
  vec3 mid    = vec3(0.060, 0.160, 0.430);
  vec3 light  = vec3(0.250, 0.480, 0.900);
  vec3 spec   = vec3(0.700, 0.880, 1.000);

  vec3 col = mix(deep, mid, smoothstep(0.0, 0.55, cell));
  col = mix(col, light, tint * .35);
  col += spec * line * 0.45;

  // Halo at mouse
  col += vec3(0.10, 0.30, 0.65) * exp(-dm * 5.0) * 0.20;

  // Vignette
  float vig = 1. - dot(uv, uv) * .25;
  col *= clamp(vig, 0., 1.);

  // Grain
  float n = fract(sin(dot(gl_FragCoord.xy, vec2(12.9898, 78.233))) * 43758.5453);
  col += (n - .5) * .015;

  gl_FragColor = vec4(col, 1.);
}
`;

function compile(t, src) {
  const s = gl.createShader(t);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s));
  return s;
}

const prog = gl.createProgram();
gl.attachShader(prog, compile(gl.VERTEX_SHADER, vs));
gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fs));
gl.linkProgram(prog);
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
const aP = gl.getAttribLocation(prog, 'p');
gl.enableVertexAttribArray(aP);
gl.vertexAttribPointer(aP, 2, gl.FLOAT, false, 0, 0);

const uRes = gl.getUniformLocation(prog, 'res');
const uTime = gl.getUniformLocation(prog, 'time');
const uMouse = gl.getUniformLocation(prog, 'mouse');
const uPulsePos = gl.getUniformLocation(prog, 'pulsePos');
const uPulseAge = gl.getUniformLocation(prog, 'pulseAge');
const uPulseAlive = gl.getUniformLocation(prog, 'pulseAlive');

let mx = window.innerWidth * 0.5, my = window.innerHeight * 0.5;
let tx = mx, ty = my;
let pulseX = 0, pulseY = 0, pulseStart = -1e9;

window.addEventListener('mousemove', e => {
  tx = e.clientX;
  ty = window.innerHeight - e.clientY;
});
window.addEventListener('mousedown', e => {
  pulseX = e.clientX;
  pulseY = window.innerHeight - e.clientY;
  pulseStart = performance.now();
});

const start = performance.now();
function frame(now) {
  const t = (now - start) / 1000;
  mx += (tx - mx) * 0.05;
  my += (ty - my) * 0.05;

  const pulseAge = (now - pulseStart) / 1000;
  const alive = pulseAge < 4 ? 1 : 0;

  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  gl.uniform2f(uRes, c.width, c.height);
  gl.uniform1f(uTime, t);
  gl.uniform2f(uMouse, mx * dpr, my * dpr);
  gl.uniform2f(uPulsePos, pulseX * dpr, pulseY * dpr);
  gl.uniform1f(uPulseAge, pulseAge);
  gl.uniform1f(uPulseAlive, alive);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Liquid · Wallpaper 01</title>
<style>
  html,body{margin:0;background:#020817;overflow:hidden;height:100%;font-family:system-ui,-apple-system,sans-serif;cursor:crosshair;}
  canvas{display:block;width:100vw;height:100vh;}
  .label{
    position:fixed;left:24px;bottom:22px;
    color:rgba(255,255,255,.45);font-size:10.5px;
    letter-spacing:.32em;text-transform:uppercase;font-weight:500;
    pointer-events:none;
    transition:opacity .8s ease;
  }
  .nav{
    position:fixed;right:24px;bottom:22px;
    display:flex;gap:14px;
    color:rgba(255,255,255,.4);font-size:10.5px;
    letter-spacing:.24em;text-transform:uppercase;font-weight:500;
  }
  .nav a{color:inherit;text-decoration:none;transition:color .2s;}
  .nav a:hover{color:#fff;}
  .nav a.active{color:#fff;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="label">01 · Liquid · Move &amp; click</div>
<div class="nav">
  <a href="index.html">◀ All</a>
  <a href="01-liquid.html" class="active">01</a>
  <a href="02-aurora.html">02</a>
  <a href="03-constellation.html">03</a>
  <a href="04-voronoi.html">04</a>
  <a href="05-depth-grid.html">05</a>
</div>
<script>
const c = document.getElementById('c');
const gl = c.getContext('webgl', { antialias: true });

function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  c.width = window.innerWidth * dpr;
  c.height = window.innerHeight * dpr;
  c.style.width = window.innerWidth + 'px';
  c.style.height = window.innerHeight + 'px';
  gl.viewport(0, 0, c.width, c.height);
}
resize();
window.addEventListener('resize', resize);

const vs = `attribute vec2 p;void main(){gl_Position=vec4(p,0.,1.);}`;

const fs = `
precision highp float;
uniform vec2 res;
uniform float time;
uniform vec2 mouse;
uniform float click;

float ball(vec2 p, vec2 c, float r) {
  return r / max(length(p - c), 0.001);
}

void main() {
  vec2 uv = (gl_FragCoord.xy - .5*res) / min(res.x, res.y);
  vec2 m  = (mouse - .5*res) / min(res.x, res.y);

  float t = time * 0.12;

  // Slow orbiting metaballs
  float v = 0.;
  v += ball(uv, vec2(sin(t*1.10)*.55,  cos(t*1.30)*.42), .19);
  v += ball(uv, vec2(cos(t*0.90)*.62,  sin(t*0.70)*.50), .17);
  v += ball(uv, vec2(sin(t*1.50+1.0)*.42,  cos(t*1.20+2.0)*.58), .15);
  v += ball(uv, vec2(cos(t*1.05+3.0)*.55,  sin(t*1.40+1.5)*.46), .16);
  v += ball(uv, vec2(sin(t*0.80+4.5)*.30,  cos(t*1.10+0.5)*.30), .12);

  // Mouse-driven blob (grows on click)
  float mr = 0.22 + click * 0.30;
  v += ball(uv, m, mr);

  // Threshold the field
  float metal = smoothstep(.85, 1.45, v);
  float core  = smoothstep(1.20, 1.55, v);

  // Blue palette
  vec3 deep = vec3(0.012, 0.030, 0.090);
  vec3 mid  = vec3(0.090, 0.230, 0.620);
  vec3 hi   = vec3(0.520, 0.780, 1.000);
  vec3 spec = vec3(0.900, 0.960, 1.000);

  vec3 col = mix(deep, mid, metal);
  col = mix(col, hi, smoothstep(.95, 1.30, v) * .70);
  col += spec * core * .35;

  // Subtle vignette
  float vig = 1. - dot(uv, uv) * .35;
  col *= clamp(vig, 0., 1.);

  // Faint film grain
  float n = fract(sin(dot(gl_FragCoord.xy, vec2(12.9898, 78.233))) * 43758.5453);
  col += (n - .5) * .015;

  gl_FragColor = vec4(col, 1.0);
}
`;

function compile(t, src) {
  const s = gl.createShader(t);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s));
  return s;
}

const prog = gl.createProgram();
gl.attachShader(prog, compile(gl.VERTEX_SHADER, vs));
gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fs));
gl.linkProgram(prog);
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
const aP = gl.getAttribLocation(prog, 'p');
gl.enableVertexAttribArray(aP);
gl.vertexAttribPointer(aP, 2, gl.FLOAT, false, 0, 0);

const uRes = gl.getUniformLocation(prog, 'res');
const uTime = gl.getUniformLocation(prog, 'time');
const uMouse = gl.getUniformLocation(prog, 'mouse');
const uClick = gl.getUniformLocation(prog, 'click');

let mx = window.innerWidth * 0.5, my = window.innerHeight * 0.5;
let tx = mx, ty = my;
let click = 0, clickTarget = 0;
window.addEventListener('mousemove', e => {
  tx = e.clientX;
  ty = window.innerHeight - e.clientY;
});
window.addEventListener('mousedown', () => { clickTarget = 1; });
window.addEventListener('mouseup', () => { clickTarget = 0; });

const start = performance.now();
function frame(now) {
  const t = (now - start) / 1000;
  // Smooth mouse follow for slow, fluid feel
  mx += (tx - mx) * 0.07;
  my += (ty - my) * 0.07;
  click += (clickTarget - click) * 0.15;

  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  gl.uniform2f(uRes, c.width, c.height);
  gl.uniform1f(uTime, t);
  gl.uniform2f(uMouse, mx * dpr, my * dpr);
  gl.uniform1f(uClick, click);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
